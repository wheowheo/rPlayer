name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: FFmpeg + pkgconf
        run: brew install ffmpeg pkgconf

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Bundle (standalone .app with dylibs)
        run: bash scripts/bundle.sh

      - name: Upload standalone
        uses: actions/upload-artifact@v4
        with:
          name: rplayer-macos
          path: dist/rPlayer-*-macos-standalone.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: FFmpeg (pre-built shared)
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-dl
          $ffdir = (Get-ChildItem ffmpeg-dl -Directory)[0].FullName
          echo "FFMPEG_DIR=$ffdir" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=$ffdir\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: pkgconf
        run: choco install pkgconfiglite -y

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $ffdir = $env:FFMPEG_DIR
          mkdir dist
          cp target\release\rplayer.exe dist\
          cp MANUAL.md dist\
          cp README.md dist\
          Get-ChildItem "$ffdir\bin\*.dll" | ForEach-Object { Copy-Item $_.FullName dist\ }
          Compress-Archive -Path dist\* -DestinationPath rplayer-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-windows-x64
          path: rplayer-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FFmpeg dev
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libavdevice-dev \
            libswscale-dev libswresample-dev \
            pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          mkdir -p pkg
          cp target/release/rplayer pkg/
          cp MANUAL.md README.md pkg/
          tar czf rplayer-linux-x64.tar.gz -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-linux-x64
          path: rplayer-linux-x64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rplayer-macos/*.tar.gz
            rplayer-windows-x64/rplayer-windows-x64.zip
            rplayer-linux-x64/rplayer-linux-x64.tar.gz
