name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===== macOS: ARM64 + x86_64 네이티브 빌드 =====
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: FFmpeg + pkgconf 설치
        run: brew install ffmpeg pkgconf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 빌드
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rplayer

  # ===== macOS: Universal Binary (.app 번들) =====
  package-macos:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: rplayer-aarch64-apple-darwin
          path: arm64/
      - uses: actions/download-artifact@v4
        with:
          name: rplayer-x86_64-apple-darwin
          path: x64/

      - name: Universal Binary 생성
        run: |
          chmod +x arm64/rplayer x64/rplayer
          lipo -create arm64/rplayer x64/rplayer -output rplayer
          file rplayer

      - name: .app 번들 패키징
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          bash scripts/package.sh
          cp dist/rplayer-*.tar.gz .
          cp dist/rplayer-*.app.tar.gz . 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-macos-universal
          path: "*.tar.gz"

  # ===== Windows: 네이티브 빌드 (MSVC + FFmpeg) =====
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: FFmpeg dev 패키지 다운로드
        shell: pwsh
        run: |
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-dl
          $ffdir = (Get-ChildItem ffmpeg-dl -Directory)[0].FullName
          echo "FFMPEG_DIR=$ffdir" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=$ffdir\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: pkgconf 설치
        run: choco install pkgconfiglite -y

      - name: 빌드
        run: cargo build --release

      - name: 패키징
        shell: pwsh
        run: |
          $ffdir = $env:FFMPEG_DIR
          mkdir dist
          cp target\release\rplayer.exe dist\
          cp MANUAL.md dist\
          # FFmpeg DLL 동봉
          Get-ChildItem "$ffdir\bin\*.dll" | ForEach-Object { Copy-Item $_.FullName dist\ }
          Compress-Archive -Path dist\* -DestinationPath rplayer-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-windows-x64
          path: rplayer-windows-x64.zip

  # ===== Linux: 네이티브 빌드 (Ubuntu) =====
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FFmpeg dev 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            pkg-config libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: 빌드
        run: cargo build --release

      - name: 패키징
        run: |
          mkdir -p dist
          cp target/release/rplayer dist/
          cp MANUAL.md dist/
          tar czf rplayer-linux-x64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: rplayer-linux-x64
          path: rplayer-linux-x64.tar.gz

  # ===== Release: 태그 푸시 시 자동 배포 =====
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Release 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rplayer-macos-universal/*.tar.gz
            rplayer-windows-x64/rplayer-windows-x64.zip
            rplayer-linux-x64/rplayer-linux-x64.tar.gz
